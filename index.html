<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTint Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #17212b; color: white; padding: 20px; }
        .card { background: #232e3c; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        button { background: #2481cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Съемная тонировка</h2>
    <div id="catalog">
        <!-- Пример карточки товара -->
        <div class="card">
            <h3>Mazda 3 (BK)</h3>
            <p>Цена: 2200 ₽</p>
            <button onclick="order('Mazda 3 BK')">Заказать</button>
        </div>
        <div class="card">
            <h3>Audi A6 (C7)</h3>
            <p>Цена: 2500 ₽</p>
            <button onclick="order('Audi A6 C7')">Заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        function order(item) {
            // Отправляем данные в бота
            tg.sendData("Заказ: " + item);
        }
    </script>
</body>
</html>
