<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тонировка Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #17212b; color: white; padding: 15px; }
        .group { background: #232e3c; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; background: #17212b; color: white; border: 1px solid #2481cc; }
        button { background: #2481cc; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>Каталог тонировки</h2>
    
    <div class="group">
        <label>Марка:</label>
        <select id="brand" onchange="updateModels()">
            <option value="">Выберите марку</option>
            <option value="Audi">Audi</option>
            <option value="BMW">BMW</option>
            <option value="Toyota">Toyota</option>
        </select>
    </div>

    <div class="group">
        <label>Модель и поколение:</label>
        <select id="model"></select>
    </div>

    <button onclick="order()">Заказать</button>

    <script>
        const data = {
            "Audi": ["A4 (B8) 2008-2015", "A4 (B9) 2015-2019", "A6 (C7) 2011-2018"],
            "BMW": ["3 Series (E90) 2005-2011", "5 Series (F10) 2010-2017"],
            "Toyota": ["Camry (XV50) 2011-2017", "Camry (XV70) 2017-2021"]
        };

        function updateModels() {
            let brand = document.getElementById('brand').value;
            let modelSelect = document.getElementById('model');
            modelSelect.innerHTML = "";
            if (data[brand]) {
                data[brand].forEach(m => {
                    modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
                });
            }
        }

        function order() {
            let m = document.getElementById('model').value;
            if(m) window.Telegram.WebApp.sendData("Заказ: " + m);
            else alert("Выберите авто!");
        }
    </script>
</body>
</html>
